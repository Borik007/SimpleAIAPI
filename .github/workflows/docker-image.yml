name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        # Using a static 'latest' tag for testing, or a timestamp for unique versioning
        docker build . \
          --file SimpleAIAPI/Dockerfile \
          --tag simpleaiapi:latest
